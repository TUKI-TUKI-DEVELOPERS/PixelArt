version: "3.9"

# ─── MODO FULL-DOCKER ─────────────────────────────────────────────────────────
# Todos los servicios corren en Docker. Un solo comando:
#   docker compose -f infra/docker/docker-compose.yml up --build
#
# Para volver a MODO HÍBRIDO (solo infra), comenta los servicios api y web.
# ──────────────────────────────────────────────────────────────────────────────

services:
  # ─── Infraestructura ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: pixelart_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pixelart}
      POSTGRES_USER: ${POSTGRES_USER:-pixelart}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pixelart_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../schemaPixelart.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pixelart} -d ${POSTGRES_DB:-pixelart}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pixelart_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: pixelart_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-pixelart_access}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-pixelart_secret_key}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Crea el bucket en MinIO y sale. Solo se ejecuta una vez (restart: no).
  minio-mc:
    image: minio/mc:latest
    container_name: pixelart_minio_mc
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-pixelart_access}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-pixelart_secret_key}
      MINIO_BUCKET: ${MINIO_BUCKET:-pixelart-assets}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY &&
        mc mb local/$$MINIO_BUCKET --ignore-existing &&
        mc anonymous set download local/$$MINIO_BUCKET &&
        echo 'MinIO: bucket $$MINIO_BUCKET listo.'
      "
    restart: "no"

  # ─── Aplicaciones ───────────────────────────────────────────────────────────
  api:
    build:
      context: ../../backend/api
      dockerfile: Dockerfile
      target: dev
    container_name: pixelart_api
    restart: unless-stopped
    env_file:
      - ../../.env.docker
    environment:
      # En Docker los hosts son los nombres de servicio, no localhost
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      MINIO_ENDPOINT: minio
      NODE_ENV: development
    ports:
      - "${API_PORT:-3001}:3001"
    volumes:
      - ../../backend/api:/app          # código fuente con hot-reload
      - api_node_modules:/app/node_modules  # node_modules del contenedor (no pisado por el bind)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s   # NestJS tarda en compilar TypeScript

  web:
    build:
      context: ../../frontend/web
      dockerfile: Dockerfile
      target: dev
    container_name: pixelart_web
    restart: unless-stopped
    env_file:
      - ../../.env.docker
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001   # browser → host expuesto
      API_INTERNAL_URL: http://api:3001            # server-side rewrites → red Docker
    ports:
      - "3000:3000"
    volumes:
      - ../../frontend/web:/app
      - web_node_modules:/app/node_modules
      - web_next:/app/.next
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  postgres_data:
  redis_data:
  minio_data:
  api_node_modules:   # node_modules del contenedor api
  web_node_modules:   # node_modules del contenedor web
  web_next:           # caché .next del contenedor web
