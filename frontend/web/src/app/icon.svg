  <!--
    ═══ PIXEL ART P ═══
    Solo <rect> con ángulos rectos — cero curvas.
    Grid de 8px × 8px. Centrada en (50,50).

    Columnas:  C0=34-42 | C1=42-50 | C2=50-58 | C3=58-66
    Filas:     R0=30-38 | R1=38-46 | R2=46-54 | R3=54-62 | R4=62-70

    Mapa de pixels:
      R0: C0 C1 C2 C3   ← barra superior (ancho completo)
      R1: C0 [  ][  ]C3 ← stem + lateral der del bowl
      R2: C0 C1 C2      ← barra media sin esquina inferior-derecha (opción B)
      R3: C0             ← stem solo
      R4: C0             ← stem solo
  -->
  <g fill="#CC1A1A" filter="url(#ps)">
    <!-- Barra superior: R0 completa -->
    <rect x="34" y="30" width="32" height="8"/>
    <!-- Stem: C0, R1–R4 -->
    <rect x="34" y="38" width="8" height="32"/>
    <!-- Lateral derecho del bowl: C3 en R1 -->
    <rect x="58" y="38" width="8" height="8"/>
    <!-- Barra media: C1–C2 (C3 removido = esquina inferior-derecha del bowl) -->
    <rect x="42" y="46" width="16" height="8"/>
  </g>
